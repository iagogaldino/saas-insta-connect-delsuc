services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_AUTH_LOGIN_PATH: ${VITE_AUTH_LOGIN_PATH}
        VITE_AUTH_REGISTER_PATH: ${VITE_AUTH_REGISTER_PATH}
        VITE_AUTH_TOKEN_STORAGE_KEY: ${VITE_AUTH_TOKEN_STORAGE_KEY}
    container_name: insta-connect-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
